<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta de Cita — Dr. Gómez Ponce</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Montserrat',sans-serif;background:#e9ecef;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:30px}
  .card{width:4in;height:2.5in;border-radius:12px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.12);background:#fff;position:relative}
  .card-header{background:linear-gradient(135deg,#175580,#2980b9);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:10px}
  .card-header-logo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.3)}
  .card-header-info{flex:1}
  .card-header-name{font-size:10px;font-weight:800;letter-spacing:0.3px}
  .card-header-spec{font-size:7px;font-weight:400;opacity:0.85;margin-top:1px}
  .card-header-badge{background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:20px;font-size:7px;font-weight:700;letter-spacing:0.5px}
  .card-body{padding:14px 18px}
  .patient-row{display:flex;align-items:center;gap:6px;margin-bottom:10px}
  .patient-label{font-size:7px;color:#888;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
  .patient-value{flex:1;font-size:10px;color:#333;border-bottom:1px solid #ddd;min-height:16px;padding-bottom:2px;outline:none}
  .appt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px}
  .appt-box{background:#f8f9fa;border-radius:8px;padding:8px 10px;text-align:center;border:1px solid #e8e8e8}
  .appt-box-icon{font-size:14px;margin-bottom:3px}
  .appt-box-label{font-size:6px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
  .appt-box-value{font-size:10px;color:#175580;font-weight:700;border-bottom:1px solid #ccc;min-width:50px;display:inline-block;outline:none;padding-bottom:1px}
  .card-footer{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:6px 18px;background:#f8f9fa;border-top:1px solid #eee}
  .card-footer-text{font-size:6px;color:#999;line-height:1.4}
  .card-footer-phone{font-size:7px;color:#175580;font-weight:700}
  .label{font-size:11px;font-weight:600;color:#666;text-align:center;letter-spacing:1px;text-transform:uppercase}
  .hint{font-size:10px;color:#888;text-align:center;max-width:350px;line-height:1.5}
  .print-btn{position:fixed;top:20px;right:20px;background:#175580;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);z-index:100}
  @media print{body{background:#fff;padding:5px}.label,.hint,.print-btn{display:none!important}.card{box-shadow:none;border:1px solid #ddd}}
</style>
</head>
<body>
<button class="print-btn" onclick="window.print()">🖨️ Imprimir</button>
<div class="label">Tarjeta de Próxima Cita</div>
<div class="hint">Haz clic en los campos para llenar los datos del paciente</div>
<div class="card">
  <div class="card-header">
    <img src="https://infectologia.org/images/logo-icono.jpg" class="card-header-logo" alt="Logo">
    <div class="card-header-info">
      <div class="card-header-name">DR. CARLOS AUGUSTO GÓMEZ PONCE</div>
      <div class="card-header-spec">Infectología · Adultos y Niños</div>
    </div>
    <div class="card-header-badge">📅 CITA</div>
  </div>
  <div class="card-body">
    <div class="patient-row">
      <span class="patient-label">Paciente:</span>
      <span class="patient-value" contenteditable="true"></span>
    </div>
    <div class="appt-grid">
      <div class="appt-box"><div class="appt-box-icon">📅</div><div class="appt-box-label">Fecha</div><span class="appt-box-value" contenteditable="true">&nbsp;</span></div>
      <div class="appt-box"><div class="appt-box-icon">🕐</div><div class="appt-box-label">Hora</div><span class="appt-box-value" contenteditable="true">&nbsp;</span></div>
      <div class="appt-box"><div class="appt-box-icon">🏥</div><div class="appt-box-label">Consultorio</div><span class="appt-box-value" contenteditable="true">&nbsp;</span></div>
    </div>
  </div>
  <div class="card-footer">
    <div class="card-footer-text">CME Unidad Sendero · Av. Fco. Villarreal Torres #2050<br>Ciudad Juárez, Chihuahua</div>
    <div class="card-footer-phone">📞 656-690-7705</div>
  </div>
</div>
</body></html>
